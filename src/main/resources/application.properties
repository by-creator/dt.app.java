# Intervalle des rappels automatiques en millisecondes (defaut : 30 min)
app.rappel.interval-ms=1800000

# Pusher Configuration
pusher.app-id=${PUSHER_APP_ID:1968407}
pusher.key=${PUSHER_KEY:7dff902bd7ea0d977455}
pusher.secret=${PUSHER_SECRET:5d15524fc022b75c8a26}
pusher.cluster=${PUSHER_CLUSTER:mt1}
pusher.scheme=https

# Security
app.security.remember-me-key=${REMEMBER_ME_KEY:dt-app-remember-me-key-change-in-prod}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
server.servlet.session.timeout=8h

# Automatisations Configuration
app.automation.basepath=automatisation
app.automation.timeout=600
app.automation.internal-token=${AUTOMATION_INTERNAL_TOKEN:dt-app-internal-automation-token}
app.automation.python-path=automatisation/venv/bin/python

# Logging
logging.level.root=INFO
logging.level.com.dtapp=INFO
logging.level.org.springframework.web=WARN
logging.file.name=logs/dtapp.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.level.org.hibernate=ERROR
logging.level.org.flywaydb=ERROR
