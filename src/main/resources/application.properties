# Application properties
spring.application.name=dt-app
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/dtapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=filesystem:src/main/resources/db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Security — users are managed in DB; no static user needed
# (admin account created automatically on startup by DataInitializer)

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/codifications

# Backblaze B2 via S3-compatible API
app.storage.b2.enabled=true
app.storage.b2.bucket-name=dt-app
app.storage.b2.endpoint=https://s3.us-east-005.backblazeb2.com
app.storage.b2.presign-duration-minutes=15
spring.cloud.aws.s3.enabled=${app.storage.b2.enabled:true}
spring.cloud.aws.region.static=us-east-005
spring.cloud.aws.s3.region=us-east-005
spring.cloud.aws.s3.endpoint=${app.storage.b2.endpoint}
spring.cloud.aws.s3.path-style-access-enabled=true
spring.cloud.aws.credentials.access-key=${B2_ACCESS_KEY:0052536a49ced3c0000000008}
spring.cloud.aws.credentials.secret-key=${B2_SECRET_KEY:K005g4G/HY8eYLsYRHEciDVjkKsd0yQ}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreplysitedt@gmail.com}
spring.mail.password=${MAIL_PASSWORD:lvdmzhlauwatvmpt}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
