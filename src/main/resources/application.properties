# Application properties
spring.application.name=dt-app
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/dtapp
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=filesystem:src/main/resources/db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Security — users are managed in DB; no static user needed
# (admin account created automatically on startup by DataInitializer)

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads/codifications

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
