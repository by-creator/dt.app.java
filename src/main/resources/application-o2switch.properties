# O2switch Profile Configuration
# Spring Boot application configuration for O2switch hosting

# Database Configuration
# Replace with your O2switch MySQL credentials
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:dtapp}?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=false&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:dtapp_user}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration for O2switch
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# DevTools disabled on production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Data Initializer
app.data-initializer.enabled=${DATA_INIT_ENABLED:false}

# Security Configuration
spring.security.user.password=${SECURITY_PASSWORD:ChangeMeInProduction!}

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:/var/www/dtapp/uploads}

# Base URL for email links and redirects
app.base-url=${APP_BASE_URL:https://your-domain.com}

# Mail Configuration (using Gmail SMTP or custom SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.starttls.protocol=TLSv1.2

# Application mail addresses
app.mail.to=${MAIL_TO:sn004-proforma@dakar-terminal.com}
app.mail.to.remise=${MAIL_TO_REMISE:sn004-remise.facturation@dakar-terminal.com}

# Logging
logging.level.root=WARN
logging.level.com.dtapp=INFO
logging.file.name=${LOG_DIR:/var/log/dtapp/application.log}
logging.file.max-size=10MB
logging.file.max-history=10
