<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocage / Déblocage - Dakar Terminal</title>
  <th:block th:replace="~{fragments/pwa-head :: pwaMeta}"></th:block>
  <script th:src="@{/js/theme.js}"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-box">
        <img th:src="@{/img/image.png}" alt="Dakar Terminal" style="max-height: 40px; width: 150px;">
      </div>
    </div>
    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a th:href="@{/menu}" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        Menu
      </a>
      <a th:href="@{/parametres}" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Paramètres
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar-sm"
             th:text="${#strings.toUpperCase(#strings.substring(loggedUser.username, 0, 1))}">A</div>
        <span class="user-display-name" th:text="${loggedUser.username}">Admin</span>
        <form th:action="@{/logout}" method="post" style="margin:0">
          <button type="submit" class="logout-btn" title="Se déconnecter">&#x2192;</button>
        </form>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main-content" style="padding:0;">

    <!-- Top bar -->
    <div class="subpage-topbar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Blocage / Déblocage
    </div>

    <!-- Tab bar -->
    <div class="subpage-tabs">
      <a th:href="@{/menu/douane/blocage}" class="subpage-tab active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Gestion Blocage / Déblocage
      </a>
    </div>

    <div style="padding: 32px 36px;">

      <!-- Breadcrumb -->
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:24px; font-size:13px; color:#64748b;">
        <a th:href="@{/menu}" style="color:#6366f1; text-decoration:none; font-weight:500;">Menu</a>
        <span>&#8250;</span>
        <a th:href="@{/menu/douane}" style="color:#6366f1; text-decoration:none; font-weight:500;">Douane</a>
        <span>&#8250;</span>
        <span class="topbar-title">Blocage / Déblocage</span>
      </div>

      <!-- Feedback messages -->
      <div th:if="${success}" class="alert-success" style="margin-bottom:20px;">
        <span th:text="${success}"></span>
      </div>
      <div th:if="${error}" class="alert-error" style="margin-bottom:20px;">
        <span th:text="${error}"></span>
      </div>

      <!-- ===== FORM CARD ===== -->
      <div class="page-section-card" style="margin-bottom:28px;">
        <div class="blocage-card-header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span>Gestion Blocage / Déblocage</span>
        </div>
        <p class="blocage-card-subtitle">Saisissez l'identifiant de l'item à bloquer ou débloquer.</p>

        <form th:action="@{/menu/douane/blocage}" method="post">
          <div class="form-group" style="margin-bottom:24px;">
            <label for="item" class="form-label">ITEM</label>
            <input type="text" id="item" name="item" class="form-input"
                   placeholder="ex: CONT-2024-001234" required>
          </div>
          <div class="blocage-actions">
            <button type="submit" name="action" value="bloquer" class="btn-bloquer">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
              </svg>
              Bloquer
            </button>
            <button type="submit" name="action" value="debloquer" class="btn-debloquer">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
              </svg>
              Débloquer
            </button>
          </div>
        </form>
      </div>

      <!-- ===== TABLE CARD ===== -->
      <div class="page-section-card" style="padding:0; overflow:hidden;">

        <!-- Table toolbar -->
        <div class="table-toolbar">
          <form th:action="@{/menu/douane/blocage}" method="get" style="display:flex; align-items:center; gap:12px; flex:1;">
            <div style="position:relative; flex:1; max-width:400px;">
              <svg style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#94a3b8;"
                   width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="search" name="search" class="table-search-input"
                     placeholder="Rechercher un item..."
                     th:value="${search}">
            </div>
            <button type="submit" class="btn-actualiser">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
              Actualiser
            </button>
          </form>
        </div>

        <!-- Table -->
        <table class="data-table">
          <thead>
            <tr>
              <th>DATE</th>
              <th>ITEM</th>
              <th>STATUT</th>
              <th>ACTIONS</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="b : ${blocageItems}">
              <td th:text="${b.formattedDate}">—</td>
              <td class="td-item" th:text="${b.item}">—</td>
              <td>
                <span class="status-badge"
                      th:classappend="${b.bloque} ? 'bloque' : 'debloque'"
                      th:text="${b.bloque} ? 'Bloqué' : 'Débloqué'">—</span>
              </td>
              <td>
                <form th:action="@{/menu/douane/blocage/action}" method="post" style="display:inline;">
                  <input type="hidden" name="id"     th:value="${b.id}">
                  <input type="hidden" name="page"   th:value="${currentPage}">
                  <input type="hidden" name="search" th:value="${search}">
                  <button th:if="${b.bloque}"
                          type="submit" name="action" value="debloquer"
                          class="btn-table-action debloque">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
                    </svg>
                    Débloquer
                  </button>
                  <button th:unless="${b.bloque}"
                          type="submit" name="action" value="bloquer"
                          class="btn-table-action bloquer">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Bloquer
                  </button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(blocageItems)}">
              <td colspan="4" style="text-align:center; color:#94a3b8; padding:32px;">
                Aucun item enregistré.
              </td>
            </tr>
          </tbody>
        </table>

        <!-- ===== PAGINATION ===== -->
        <div class="pagination-bar" th:if="${totalPages > 0}">
          <span class="pagination-info"
                th:text="${totalItems} + ' enregistrement' + (${totalItems} > 1 ? 's' : '') +
                          ' · Page ' + (${currentPage} + 1) + ' / ' + ${totalPages}">
          </span>

          <div class="pagination-controls">

            <!-- Première page -->
            <a class="page-btn"
               th:classappend="${currentPage == 0} ? 'disabled' : ''"
               th:href="${currentPage == 0} ? '#' : @{/menu/douane/blocage(page=0, search=${search})}">
              ««
            </a>

            <!-- Précédent -->
            <a class="page-btn"
               th:classappend="${currentPage == 0} ? 'disabled' : ''"
               th:href="${currentPage == 0} ? '#' : @{/menu/douane/blocage(page=${currentPage - 1}, search=${search})}">
              ‹
            </a>

            <!-- Pages numérotées -->
            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
              <a class="page-btn"
                 th:classappend="${i == currentPage} ? 'active' : ''"
                 th:href="@{/menu/douane/blocage(page=${i}, search=${search})}"
                 th:text="${i + 1}">1</a>
            </th:block>

            <!-- Suivant -->
            <a class="page-btn"
               th:classappend="${currentPage + 1 >= totalPages} ? 'disabled' : ''"
               th:href="${currentPage + 1 >= totalPages} ? '#' : @{/menu/douane/blocage(page=${currentPage + 1}, search=${search})}">
              ›
            </a>

            <!-- Dernière page -->
            <a class="page-btn"
               th:classappend="${currentPage + 1 >= totalPages} ? 'disabled' : ''"
               th:href="${currentPage + 1 >= totalPages} ? '#' : @{/menu/douane/blocage(page=${totalPages - 1}, search=${search})}">
              »»
            </a>

          </div>
        </div>

      </div>
    </div>
  </main>
</div>

</body>
</html>
