<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blocage / Déblocage - Dakar Terminal</title>
  <th:block th:replace="~{fragments/pwa-head :: pwaMeta}"></th:block>
  <script th:src="@{/js/theme.js}"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-box">
        <img th:src="@{/img/image.png}" alt="Dakar Terminal" style="max-height: 40px; width: 150px;">
      </div>
    </div>
    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a th:href="@{/menu}" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        Menu
      </a>
      <a th:href="@{/parametres}" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Paramètres
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar-sm"
             th:text="${#strings.toUpperCase(#strings.substring(loggedUser.username, 0, 1))}">A</div>
        <span class="user-display-name" th:text="${loggedUser.username}">Admin</span>
        <form th:action="@{/logout}" method="post" style="margin:0">
          <button type="submit" class="logout-btn" title="Se déconnecter">&#x2192;</button>
        </form>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main-content" style="padding:0;">

    <!-- Top bar -->
    <div class="subpage-topbar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Blocage / Déblocage
    </div>

    <!-- Tab bar -->
    <div class="subpage-tabs">
      <a th:href="@{/menu/douane/blocage}" class="subpage-tab active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Gestion Blocage / Déblocage
      </a>
    </div>

    <div style="padding: 32px 36px;">

      <!-- Breadcrumb -->
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:24px; font-size:13px; color:#64748b;">
        <a th:href="@{/menu}" style="color:#6366f1; text-decoration:none; font-weight:500;">Menu</a>
        <span>&#8250;</span>
        <a th:href="@{/menu/douane}" style="color:#6366f1; text-decoration:none; font-weight:500;">Douane</a>
        <span>&#8250;</span>
        <span class="topbar-title">Blocage / Déblocage</span>
      </div>

      <span th:if="${success}" id="_flashSuccess" th:text="${success}" style="display:none"></span>
      <span th:if="${error}"   id="_flashError"   th:text="${error}"   style="display:none"></span>

      <!-- ===== FORM CARD ===== -->
      <div class="page-section-card" style="margin-bottom:28px;">
        <div class="blocage-card-header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span>Gestion Blocage / Déblocage</span>
        </div>
        <p class="blocage-card-subtitle">Saisissez l'identifiant de l'item à bloquer ou débloquer.</p>

        <form th:action="@{/menu/douane/blocage}" method="post">
          <div class="form-group" style="margin-bottom:24px;">
            <label for="item" class="form-label">ITEM</label>
            <input type="text" id="item" name="item" class="form-input"
                   placeholder="ex: CONT-2024-001234" required>
          </div>
          <div class="blocage-actions">
            <button type="submit" name="action" value="bloquer" class="btn-bloquer">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
              </svg>
              Bloquer
            </button>
            <button type="submit" name="action" value="debloquer" class="btn-debloquer">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
              </svg>
              Débloquer
            </button>
          </div>
        </form>
      </div>

      <!-- ===== TABLE CARD ===== -->
      <div class="page-section-card" style="padding:0; overflow:hidden;">

        <!-- Table toolbar -->
        <div class="table-toolbar">
          <div style="display:flex; align-items:center; gap:10px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <span style="font-weight:600; font-size:14px;">Historique</span>
          </div>
          <span class="pagination-info" th:text="${totalItems} + ' item' + (${totalItems} > 1 ? 's' : '')">0</span>
        </div>

        <!-- Column filter bar -->
        <div style="padding:10px 16px; background:#f8fafc; border-bottom:1px solid rgba(148,163,184,0.15);">
          <form th:action="@{/menu/douane/blocage}" method="get" style="display:flex; flex-wrap:wrap; gap:8px; align-items:flex-end;">
            <div style="display:flex; flex-direction:column; gap:3px;">
              <label style="font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase;">Date</label>
              <input type="date" name="filterDate" class="table-search-input" style="width:150px;" th:value="${filterDate}">
            </div>
            <div style="display:flex; flex-direction:column; gap:3px;">
              <label style="font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase;">Item</label>
              <input type="text" name="filterItem" class="table-search-input" style="width:180px;" placeholder="Item..." th:value="${filterItem}">
            </div>
            <div style="display:flex; flex-direction:column; gap:3px;">
              <label style="font-size:11px; font-weight:600; color:#64748b; text-transform:uppercase;">Statut</label>
              <select name="filterStatut" class="table-search-input" style="width:140px;">
                <option value="" th:selected="${filterStatut == '' or filterStatut == null}">Tous</option>
                <option value="BLOQUE"   th:selected="${filterStatut == 'BLOQUE'}">Bloque</option>
                <option value="DEBLOQUE" th:selected="${filterStatut == 'DEBLOQUE'}">Debloque</option>
              </select>
            </div>
            <div style="display:flex; gap:6px; align-items:flex-end;">
              <button type="submit" class="btn-actualiser" style="height:36px; white-space:nowrap;">Filtrer</button>
              <a th:href="@{/menu/douane/blocage}" class="btn-actualiser" style="text-decoration:none; height:36px; display:inline-flex; align-items:center;">Effacer</a>
            </div>
          </form>
        </div>

        <!-- Table -->
                <div class="table-wrapper">
<table class="data-table">
          <thead>
            <tr>
              <th>DATE</th>
              <th>ITEM</th>
              <th>STATUT</th>
              <th>ACTIONS</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="b : ${blocageItems}">
              <td th:text="${b.formattedDate}">—</td>
              <td class="td-item" th:text="${b.item}">—</td>
              <td>
                <span class="status-badge"
                      th:classappend="${b.bloque} ? 'bloque' : 'debloque'"
                      th:text="${b.bloque} ? 'Bloqué' : 'Débloqué'">—</span>
              </td>
              <td>
                <form th:action="@{/menu/douane/blocage/action}" method="post" style="display:inline;">
                  <input type="hidden" name="id"           th:value="${b.id}">
                  <input type="hidden" name="page"         th:value="${currentPage}">
                  <input type="hidden" name="filterItem"   th:value="${filterItem}">
                  <input type="hidden" name="filterStatut" th:value="${filterStatut}">
                  <input type="hidden" name="filterDate"   th:value="${filterDate}">
                  <button th:if="${b.bloque}"
                          type="submit" name="action" value="debloquer"
                          class="btn-table-action debloque">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
                    </svg>
                    Débloquer
                  </button>
                  <button th:unless="${b.bloque}"
                          type="submit" name="action" value="bloquer"
                          class="btn-table-action bloquer">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Bloquer
                  </button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(blocageItems)}">
              <td colspan="4" style="text-align:center; color:#94a3b8; padding:32px;">
                Aucun item enregistré.
              </td>
            </tr>
          </tbody>
        </table>
        </div>


      </div>
    </div>
  </main>
</div>

</body>
</html>
