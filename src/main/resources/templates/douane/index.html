<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Douane - Dakar Terminal</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-box">
        <img th:src="@{/img/image.png}" alt="Dakar Terminal" style="max-height: 40px; width: 150px;">
      </div>
    </div>

    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a th:href="@{/menu}" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        Menu
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar-sm"
             th:text="${#strings.toUpperCase(#strings.substring(loggedUser.username, 0, 1))}">A</div>
        <span class="user-display-name" th:text="${loggedUser.username}">Admin</span>
        <form th:action="@{/logout}" method="post" style="margin:0">
          <button type="submit" class="logout-btn" title="Se déconnecter">&#x2192;</button>
        </form>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main-content">

    <!-- Breadcrumb -->
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:28px; font-size:13px; color:#64748b;">
      <a th:href="@{/menu}" style="color:#6366f1; text-decoration:none; font-weight:500;">Menu</a>
      <span>&#8250;</span>
      <span style="color:#0f172a; font-weight:600;">Douane</span>
    </div>

    <div class="page-header" style="margin-bottom:32px;">
      <div>
        <div class="page-badge"><span class="page-badge-dot"></span> MENU DOUANE</div>
        <h1 class="page-title">Douane</h1>
        <p class="page-subtitle">Accédez aux fonctionnalités disponibles pour le module Douane.</p>
      </div>
    </div>

    <div class="modules-grid" style="grid-template-columns: repeat(4, 1fr);">

      <!-- Gestion Blocage / Déblocage -->
      <a th:href="@{/menu/douane/blocage}" class="module-card">
        <div class="module-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="module-title">Gestion Blocage / Déblocage</div>
        <div class="module-desc">Bloquer ou débloquer un item dans le système douanier.</div>
        <div class="module-link">Ouvrir <span>&#x2197;</span></div>
      </a>

    </div>

  </main>
</div>

</body>
</html>
