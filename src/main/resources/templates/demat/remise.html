<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demande de remise - Dakar Terminal</title>
  <th:block th:replace="~{fragments/pwa-head :: pwaMeta}"></th:block>
  <link rel="stylesheet" th:href="@{/css/brand-base.css}">
  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #f8fbff 0%, #edf3fb 100%);
      color: #0f172a;
    }
    .shell {
      min-height: 100vh;
      padding: 24px;
    }
    .frame {
      min-height: calc(100vh - 48px);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow: 0 22px 50px rgba(15,23,42,0.08);
      overflow: hidden;
    }
    .page {
      min-height: 100%;
      padding: 32px 40px 50px;
      margin: 0 auto;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      background: #5447b0;
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    h1 {
      margin: 22px 0 22px;
      text-align: center;
      font-size: 28px;
      text-decoration: underline;
      text-underline-offset: 5px;
    }
    .social {
      display: flex;
      justify-content: center;
      gap: 14px;
      background: #edf3fb;
      border: 1px solid #d7e1f1;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 24px;
    }
    .social span {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
    }
    .f1 { background: #ff9f2f; }
    .f2 { background: #316bca; }
    .f3 { background: #ef4444; }
    .f4 { background: #0f9c88; }
    .f5 { background: #8c35bf; }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: 1px solid #d9e2ef;
      padding: 0 16px;
      font-size: 15px;
      box-sizing: border-box;
      margin-bottom: 16px;
    }
    input[type="file"] {
      padding: 10px 12px;
      height: auto;
      background: white;
    }
    .submit {
      width: 100%;
      margin-top: 14px;
      height: 56px;
      border: 0;
      border-radius: 10px;
      background: #3367bf;
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      color: #64748b;
      font-size: 12px;
    }
    .alert-success {
      background: #dcfce7;
      border: 1px solid #86efac;
      color: #166534;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 20px;
      font-weight: 600;
      font-size: 14px;
    }
    @media (prefers-color-scheme: dark) {
      .alert-success { background: #14532d; border-color: #166534; color: #4ade80; }
    }
    @media (max-width: 640px) {
      .shell {
        padding: 16px;
      }
      .page {
        padding: 20px 20px 32px;
      }
    }

    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; color-scheme: dark; }
      .frame { background: rgba(15, 23, 42, 0.97); border-color: rgba(148,163,184,0.12); }
      .social { background: #1e293b; border-color: rgba(148,163,184,0.15); }
      label { color: #94a3b8; }
      input { background: #1e293b; border-color: rgba(148,163,184,0.2); color: #e2e8f0; }
      input[type="file"] { background: #1e293b; }
      .footer { color: #64748b; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="frame">
    <div class="page">
    <a th:href="@{/demat}" class="back">&#8592; Retour</a>
    <h1>Formulaire de demande de remise</h1>

    <div th:if="${param.success}" class="alert-success">
      &#10003; Votre demande de remise a ete envoyee avec succes. Vous serez contacte(e) sous peu.
    </div>

    <form th:action="@{/demat/remise}" method="post" enctype="multipart/form-data">
      <label for="nom">Nom</label>
      <input id="nom" name="nom" type="text" placeholder="Votre nom" required>

      <label for="prenom">Prenom</label>
      <input id="prenom" name="prenom" type="text" placeholder="Votre prenom" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="Votre email" required>

      <label for="bl-number">Numero de BL</label>
      <input id="bl-number" name="bl-number" type="text" placeholder="Votre numero de BL" required>

      <label for="maison-transit">Maison de transit</label>
      <input id="maison-transit" name="maison-transit" type="text" placeholder="Votre maison de transit">

      <label for="demande-manuscrite">Demande manuscrite</label>
      <input id="demande-manuscrite" name="demande-manuscrite" type="file">

      <label for="bad-shipping">Bad shipping</label>
      <input id="bad-shipping" name="bad-shipping" type="file">

      <label for="bl-file">BL</label>
      <input id="bl-file" name="bl-file" type="file">

      <label for="facture-file">Facture</label>
      <input id="facture-file" name="facture-file" type="file">

      <label for="declaration-file">Declaration</label>
      <input id="declaration-file" name="declaration-file" type="file">

      <button type="submit" class="submit">ENVOYER LA DEMANDE DE REMISE</button>
    </form>

    <div class="footer">© 2026 DakarTerminal. Tous droits reserves.</div>
    </div>
  </div>
</div>
</body>
</html>
