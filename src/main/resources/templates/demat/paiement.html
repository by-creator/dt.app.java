<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement - Dakar Terminal</title>
  <th:block th:replace="~{fragments/pwa-head :: pwaMeta}"></th:block>
  <link rel="stylesheet" th:href="@{/css/brand-base.css}">
  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #f8fbff 0%, #edf3fb 100%);
      color: #0f172a;
    }
    .shell {
      min-height: 100vh;
      padding: 24px;
    }
    .frame {
      min-height: calc(100vh - 48px);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow: 0 22px 50px rgba(15,23,42,0.08);
      overflow: hidden;
    }
    .page {
      min-height: 100%;
      padding: 32px 40px 50px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      background: #5447b0;
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    h1 {
      margin: 22px 0 16px;
      text-align: center;
      font-size: 30px;
      text-decoration: underline;
      text-underline-offset: 5px;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 18px;
      margin-bottom: 28px;
    }
    .operators {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      max-width: 520px;
      margin: 0 auto;
    }
    .operator {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 150px;
      background: #edf3fb;
      border: 1px solid #d7e1f1;
      border-radius: 18px;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 12px 28px rgba(15,23,42,0.04);
      padding: 18px;
    }
    .operator:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 36px rgba(15,23,42,0.08);
    }
    .operator img {
      max-width: 170px;
      max-height: 80px;
      object-fit: contain;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      color: #64748b;
      font-size: 12px;
    }
    @media (max-width: 700px) {
      .page { padding: 24px 18px 36px; }
      .operators { gap: 12px; }
      .operator { min-height: 120px; padding: 12px; border-radius: 14px; }
      .operator img { max-width: 120px; max-height: 56px; }
      h1 { font-size: 24px; }
      .subtitle { font-size: 15px; }
    }

    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); color: #e2e8f0; color-scheme: dark; }
      .frame { background: rgba(15, 23, 42, 0.97); border-color: rgba(148,163,184,0.12); }
      .subtitle { color: #94a3b8; }
      .operator { background: #1e293b; border-color: rgba(148,163,184,0.15); }
      .operator:hover { box-shadow: 0 16px 36px rgba(0,0,0,0.4); }
      .footer { color: #64748b; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="frame">
    <div class="page">
    <a th:href="@{/demat}" class="back">&#8592; Retour</a>
    <h1>Paiement</h1>
    <div class="subtitle">Choisissez votre operateur de paiement</div>

    <div class="operators">
      <a href="https://maritimes.sycapay.app/payment/pay/zt44-q82" class="operator" aria-label="SycaPay">
        <img th:src="@{/img/operateur/sycapay.png}" alt="SycaPay">
      </a>
      <a href="#" class="operator" aria-label="InTouch">
        <img th:src="@{/img/operateur/intouch.png}" alt="InTouch">
      </a>
    </div>

    <div class="footer">© 2026 DakarTerminal. Tous droits reserves.</div>
    </div>
  </div>
</div>
</body>
</html>
