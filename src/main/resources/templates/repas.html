<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu du jour - Dakar Terminal</title>
  <th:block th:replace="~{fragments/pwa-head :: pwaMeta}"></th:block>
  <script th:src="@{/js/theme.js}"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-box">
        <img th:src="@{/img/image.png}" alt="Dakar Terminal" style="max-height: 40px; width: 150px;">
      </div>
    </div>
    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a th:href="@{/menu}" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        Menu
      </a>
      <a th:href="@{/parametres}" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Parametres
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar-sm"
             th:text="${#strings.toUpperCase(#strings.substring(loggedUser.username, 0, 1))}">A</div>
        <span class="user-display-name" th:text="${loggedUser.username}">Admin</span>
        <form th:action="@{/logout}" method="post" style="margin:0">
          <button type="submit" class="logout-btn" title="Se deconnecter">&#x2192;</button>
        </form>
      </div>
    </div>
  </aside>

  <main class="main-content" style="padding:0;">

    <div class="subpage-topbar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11h18"/><path d="M5 11a7 7 0 0 1 14 0"/><path d="M8 15h8"/><path d="M12 15v5"/>
      </svg>
      Menu du jour
    </div>

    <div style="padding: 32px 36px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:24px; font-size:13px; color:#64748b;">
        <a th:href="@{/menu/dt}" style="color:#6366f1; text-decoration:none; font-weight:500;">Menu DT</a>
        <span>&#8250;</span>
        <span class="topbar-title">Repas</span>
      </div>

      <div th:if="${success}" class="alert-success" style="margin-bottom:20px;">
        <span th:text="${success}"></span>
      </div>

      <div class="page-section-card" style="max-width:560px;">
        <div class="blocage-card-header">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 11h18"/><path d="M5 11a7 7 0 0 1 14 0"/><path d="M8 15h8"/><path d="M12 15v5"/>
          </svg>
          <span>Menu du jour</span>
        </div>
        <p class="blocage-card-subtitle">Saisissez les deux plats du jour puis envoyez le menu par email.</p>

        <form th:action="@{/menu/dt/repas}" method="post">
          <div class="form-group" style="margin-bottom:20px;">
            <label for="plat1" class="form-label">Plat 1</label>
            <input type="text" id="plat1" name="plat1" class="form-input"
                   placeholder="ex: Thieboudienne" required>
          </div>
          <div class="form-group" style="margin-bottom:24px;">
            <label for="plat2" class="form-label">Plat 2</label>
            <input type="text" id="plat2" name="plat2" class="form-input"
                   placeholder="ex: Yassa poulet" required>
          </div>
          <div class="blocage-actions">
            <button type="submit" class="btn-actualiser">Envoyer</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

</body>
</html>
