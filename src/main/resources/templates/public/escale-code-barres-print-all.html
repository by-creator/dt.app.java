<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impression - Document complet</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .print-topbar {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(15,23,42,0.92);
      border-bottom: 1px solid rgba(148,163,184,0.22);
    }
    .print-topbar h1 {
      margin: 0;
      font-size: 16px;
    }
    .print-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .print-actions a,
    .print-actions button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .print-actions button { background: #2563eb; color: #fff; }
    .print-actions a     { background: #1e293b; color: #e2e8f0; }
    @media print {
      .print-topbar { display: none; }
    }
    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }
    .print-fallback {
      padding: 28px 20px;
      max-width: 720px;
    }
    .print-fallback p { color: #cbd5e1; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="print-topbar">
    <h1>Document complet - tous les escale-code-barres</h1>
    <div class="print-actions">
      <button th:if="${hasPdfs}" type="button" onclick="window.print()">Imprimer</button>
      <a th:href="@{/escale-code-barres/print-all/file}" th:if="${hasPdfs}">Telecharger le fichier</a>
      <a th:href="@{/escale-code-barres}">Retour</a>
    </div>
  </div>

  <iframe th:if="${hasPdfs}"
          th:src="@{|/escale-code-barres/print-all/file#toolbar=0&navpanes=0|}"
          onload="setTimeout(function(){ window.print(); }, 500)"></iframe>

  <div th:if="${!hasPdfs}" class="print-fallback">
    <h2>Aucun document disponible</h2>
    <p>Il n'y a pas encore de fichiers PDF importes. <a th:href="@{/escale-code-barres}" style="color:#6366f1;">Retour</a></p>
  </div>
</body>
</html>
