<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teks publics - Dakar Terminal</title>
  <th:block th:replace="~{fragments/pwa-head :: pwaMeta}"></th:block>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,0.12), transparent 32%),
        linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      color: #0f172a;
    }
    .teks-public-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }
    .teks-hero {
      background: rgba(255,255,255,0.86);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(15,23,42,0.08);
      margin-bottom: 24px;
    }
    .teks-hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.05;
    }
    .teks-hero p {
      margin: 0;
      color: #475569;
      max-width: 720px;
      font-size: 15px;
    }
    .teks-search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    .teks-search-row input {
      flex: 1 1 260px;
      min-height: 50px;
      border-radius: 16px;
      border: 1px solid rgba(148,163,184,0.28);
      padding: 0 18px;
      font-size: 15px;
      background: rgba(255,255,255,0.95);
    }
    .teks-search-row button,
    .teks-search-row a {
      min-height: 50px;
      border-radius: 16px;
      border: none;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .teks-search-row button {
      background: #0f172a;
      color: #fff;
      cursor: pointer;
    }
    .teks-search-row a {
      background: #e2e8f0;
      color: #0f172a;
    }
    .teks-meta {
      margin: 18px 0 0;
      color: #64748b;
      font-size: 14px;
    }
    .teks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }
    .teks-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(248,250,252,0.98) 100%);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 16px 34px rgba(15,23,42,0.08);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .teks-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 42px rgba(15,23,42,0.12);
      border-color: rgba(37,99,235,0.24);
    }
    .teks-card-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 11px;
      font-weight: 800;
      padding: 7px 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .teks-card h2 {
      margin: 18px 0 8px;
      font-size: 22px;
      line-height: 1.15;
    }
    .teks-card dl {
      margin: 0;
      display: grid;
      gap: 12px;
    }
    .teks-card dt {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 4px;
    }
    .teks-card dd {
      margin: 0;
      color: #0f172a;
      font-size: 14px;
      word-break: break-word;
    }
    .teks-card-footer {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #475569;
      font-size: 13px;
      font-weight: 600;
    }
    .teks-empty {
      background: rgba(255,255,255,0.9);
      border: 1px dashed rgba(148,163,184,0.4);
      border-radius: 24px;
      padding: 42px 24px;
      text-align: center;
      color: #64748b;
    }
    .teks-pagination {
      margin-top: 26px;
    }
  </style>
</head>
<body>
  <div class="teks-public-shell">
    <section class="teks-hero">
      <h1>Teks</h1>
      <p>Retrouvez les fichiers disponibles par BL ou chassis. Un clic sur une carte ouvre directement la vue d'impression du document associe.</p>

      <form method="get" class="teks-search-row">
        <input type="search" name="search" th:value="${search}" placeholder="Rechercher un BL, un chassis ou un nom de fichier...">
        <button type="submit">Rechercher</button>
        <a th:href="@{/teks}">Effacer</a>
      </form>

      <div class="teks-meta" th:text="${totalItems} + ' resultat' + (${totalItems} > 1 ? 's' : '')"></div>
    </section>

    <section th:if="${#lists.isEmpty(teksList)}" class="teks-empty">
      Aucun teks ne correspond a votre recherche.
    </section>

    <section th:if="${!#lists.isEmpty(teksList)}" class="teks-grid">
      <a th:each="teks : ${teksList}" th:href="@{/teks/{id}/print(id=${teks.id})}" class="teks-card">
        <span class="teks-card-badge">Impression</span>
        <h2 th:text="${teks.bl}">BL</h2>
        <dl>
          <div>
            <dt>Chassis</dt>
            <dd th:text="${teks.chassis}">CHASSIS</dd>
          </div>
          <div>
            <dt>Fichier</dt>
            <dd th:text="${teks.fileName}">document.pdf</dd>
          </div>
        </dl>
        <div class="teks-card-footer">
          <span th:text="${teks.formattedDate}">15/04/2026 10:00</span>
          <span>Ouvrir</span>
        </div>
      </a>
    </section>

    <div class="teks-pagination">
      <th:block th:replace="~{fragments/pagination :: server('/teks', 'page')}"></th:block>
    </div>
  </div>
</body>
</html>
