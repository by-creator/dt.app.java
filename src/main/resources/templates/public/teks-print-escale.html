<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Impression - ' + ${escale}">Impression escale</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      color: #e2e8f0;
    }
    .print-topbar {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(15,23,42,0.92);
      border-bottom: 1px solid rgba(148,163,184,0.22);
    }
    .print-topbar h1 { margin: 0; font-size: 16px; }
    .print-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .print-actions a,
    .print-actions button {
      border: none; border-radius: 12px; padding: 10px 14px;
      font-size: 13px; font-weight: 700; text-decoration: none; cursor: pointer;
    }
    .print-actions button { background: #2563eb; color: #fff; }
    .print-actions a     { background: #1e293b; color: #e2e8f0; }
    .page-image {
      width: 100%;
      background: #fff;
    }
    .page-image img {
      width: 100%;
      height: auto;
      display: block;
    }
    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #94a3b8;
    }
    /* Layout écran uniquement */
    @media screen {
      body { background: #0f172a; }
    }
    /* Impression : aucun flex, saut de page entre chaque image */
    @media print {
      .print-topbar { display: none; }
      .page-image {
        break-after: page;
        page-break-after: always;
      }
      .page-image:last-child {
        break-after: avoid;
        page-break-after: avoid;
      }
    }
  </style>
</head>
<body>
  <div class="print-topbar">
    <h1>Escale : <span th:text="${escale}"></span></h1>
    <div class="print-actions">
      <button th:if="${!pages.isEmpty()}" type="button" onclick="triggerPrint()">Imprimer</button>
      <a th:href="@{/teks}">Retour</a>
    </div>
  </div>

  <div th:if="${!pages.isEmpty()}">
    <div th:each="page : ${pages}" class="page-image">
      <img th:src="@{/teks/files/{id}(id=${page.id})}"
           th:alt="${page.bl}"
           onload="imageLoaded()">
    </div>
  </div>

  <div class="empty-state" th:if="${pages.isEmpty()}">
    <p>Aucune image disponible pour cette escale.</p>
  </div>

  <script th:inline="javascript">
    const totalImages = /*[[${pages.size()}]]*/ 0;
    let loadedCount = 0;
    let autoPrintDone = false;

    function imageLoaded() {
      loadedCount++;
      if (!autoPrintDone && loadedCount >= totalImages && totalImages > 0) {
        autoPrintDone = true;
        setTimeout(function () { window.print(); }, 500);
      }
    }

    function triggerPrint() {
      window.print();
    }
  </script>
</body>
</html>
