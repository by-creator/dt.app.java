<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prendre un ticket - Dakar Terminal</title>
  <th:block th:replace="~{fragments/pwa-head :: pwaMeta}"></th:block>
  <script th:src="@{/js/theme.js}"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    body{margin:0;font-family:inherit;background:linear-gradient(180deg,#f8fafc 0%,#eef2ff 100%)}.ticket-page{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:42px 20px}.ticket-shell{width:min(820px,100%);text-align:center}.ticket-logo{margin-bottom:24px}.ticket-title{font-size:18px;font-weight:800;color:#0f172a;margin:14px 0 30px}
    .ticket-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;max-width:690px;margin:0 auto}.ticket-card{background:rgba(255,255,255,.94);border:1px solid #dbe4ff;border-radius:24px;padding:28px 22px;box-shadow:0 18px 40px rgba(15,23,42,.08);text-decoration:none;color:inherit}.ticket-card:hover{transform:translateY(-2px);transition:.18s ease}
    .ticket-icon{width:64px;height:64px;border-radius:20px;display:grid;place-items:center;color:#fff;margin:0 auto 16px}.ticket-name{font-size:16px;font-weight:800;color:#0f172a}.ticket-code{margin-top:10px;font-size:14px;color:#64748b;font-weight:700}
    .icon-blue{background:linear-gradient(135deg,#38bdf8,#2563eb)}.icon-purple{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}.icon-teal{background:linear-gradient(135deg,#14b8a6,#0f766e)}.icon-orange{background:linear-gradient(135deg,#fb923c,#f97316)}.icon-slate{background:linear-gradient(135deg,#94a3b8,#475569)}
    [data-theme="dark"] body{background:linear-gradient(180deg,#0f172a 0%,#111827 100%)}[data-theme="dark"] .ticket-card{background:#1e293b;border-color:#334155}[data-theme="dark"] .ticket-title,[data-theme="dark"] .ticket-name{color:#f1f5f9}[data-theme="dark"] .ticket-code{color:#94a3b8}
    @media (max-width: 640px){.ticket-page{padding:28px 14px}.ticket-grid{gap:12px}.ticket-card{padding:20px 12px;border-radius:18px}.ticket-icon{width:52px;height:52px;border-radius:16px;margin-bottom:12px}.ticket-name{font-size:13px}.ticket-code{font-size:12px}}
  </style>
</head>
<body>
<div class="ticket-page">
  <div class="ticket-shell">
    <div class="ticket-logo">
      <img th:src="@{/img/image.png}" alt="Dakar Terminal" style="max-width:300px;width:100%;">
      <div style="margin-top:8px;color:#64748b;">Gestion de la file d'attente</div>
    </div>
    <div class="ticket-title">Choisissez votre service</div>

    <div class="ticket-grid">
      <form th:each="service,stat : ${services}" th:action="@{/gfa/ticket}" method="post" style="margin:0;">
        <input type="hidden" name="serviceId" th:value="${service.id}">
        <input type="hidden" name="token" th:value="${ticketToken}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="ticket-card" style="width:100%;border:none;cursor:pointer;">
          <div class="ticket-icon" th:classappend="${stat.index % 5 == 0} ? ' icon-blue' : (${stat.index % 5 == 1} ? ' icon-purple' : (${stat.index % 5 == 2} ? ' icon-teal' : (${stat.index % 5 == 3} ? ' icon-orange' : ' icon-slate')))">
            <span th:text="${service.code != null and !#strings.isEmpty(service.code) ? #strings.substring(service.code,0,1).toUpperCase() : #strings.substring(service.nom,0,1).toUpperCase()}">S</span>
          </div>
          <div class="ticket-name" th:text="${#strings.toUpperCase(service.nom)}">SERVICE</div>
          <div class="ticket-code" th:text="${service.code != null ? service.code : '-'}">S</div>
        </button>
      </form>
    </div>
  </div>
</div>
<script>
  document.querySelectorAll('form[action="/gfa/ticket"]').forEach((form) => {
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const response = await fetch(form.action, {
        method: 'POST',
        body: new FormData(form),
        credentials: 'same-origin'
      });

      if (response.redirected) {
        window.location.replace(response.url);
        return;
      }

      const html = await response.text();
      document.open();
      document.write(html);
      document.close();
    });
  });
</script>
</body>
</html>
