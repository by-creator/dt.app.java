<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Compagnie - Dakar Terminal</title>
  <script th:src="@{/js/theme.js}"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-box">
        <img th:src="@{/img/image.png}" alt="Dakar Terminal" style="max-height: 40px; width: 150px;">
      </div>
    </div>

    <nav class="sidebar-nav">
      <a th:href="@{/dashboard}" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>
      <a th:href="@{/menu}" class="nav-item active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        Menu
      </a>
      <a th:href="@{/parametres}" class="nav-item">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Paramètres
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-row">
        <div class="user-avatar-sm"
             th:text="${#strings.toUpperCase(#strings.substring(loggedUser.username, 0, 1))}">A</div>
        <span class="user-display-name" th:text="${loggedUser.username}">Admin</span>
        <form th:action="@{/logout}" method="post" style="margin:0">
          <button type="submit" class="logout-btn" title="Se déconnecter">&#x2192;</button>
        </form>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main-content">

    <div class="page-header-card">
      <div>
        <div class="page-badge"><span class="page-badge-dot"></span> MENU COMPAGNIE</div>
        <h1 class="page-title" style="font-size:26px; margin-bottom:4px;">Menu Compagnie</h1>
        <p class="page-subtitle">Accédez aux modules disponibles pour la gestion des compagnies.</p>
      </div>
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; color:#64748b;">
        <a th:href="@{/menu}" style="color:#6366f1; text-decoration:none; font-weight:500;">Menu</a>
        <span>&#8250;</span>
        <span>Compagnie</span>
      </div>
    </div>

    <div class="modules-grid">

      <!-- Gestion de Manifeste -->
      <a href="#" class="module-card" data-name="gestion manifeste">
        <div class="module-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <div class="module-title">Gestion de Manifeste</div>
        <div class="module-desc">Gérez les manifestes des compagnies maritimes.</div>
        <div class="module-link">Ouvrir <span>&#x2197;</span></div>
      </a>

    </div>

  </main>
</div>

</body>
</html>
