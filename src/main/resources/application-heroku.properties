# Heroku Profile Configuration

# Database - Uses DATABASE_URL environment variable from Heroku
spring.datasource.url=${DATABASE_URL}
spring.datasource.hikari.maximum-pool-size=10

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway Configuration for Heroku
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# DevTools disabled on Heroku
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Security Configuration
spring.security.user.password=${SECURITY_PASSWORD:admin123}

# Base URL for email links (set APP_BASE_URL on Heroku: heroku config:set APP_BASE_URL=https://your-app.herokuapp.com)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Logging
logging.level.root=WARN
logging.level.com.dtapp=INFO
