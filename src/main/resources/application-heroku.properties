# Heroku Profile Configuration

# Heroku Profile Configuration

# Database - Uses MySQL environment variables from Heroku
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:dtapp}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway Configuration for Heroku
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# DevTools disabled on Heroku
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Data Initializer
app.data-initializer.enabled=true

# Base URL for email links
app.base-url=${APP_BASE_URL}

# Backblaze B2 — valeurs obligatoires via Heroku Config Vars
spring.cloud.aws.credentials.access-key=${B2_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${B2_SECRET_KEY}

# Mail — mot de passe obligatoire via Heroku Config Vars
spring.mail.password=${MAIL_PASSWORD}

# Pusher — secret obligatoire via Heroku Config Vars
pusher.app-id=1968407
pusher.key=7dff902bd7ea0d977455
pusher.secret=${PUSHER_SECRET}
pusher.cluster=mt1
pusher.scheme=https

# Remember-me — clé obligatoire via Heroku Config Vars
app.security.remember-me-key=${REMEMBER_ME_KEY}

# Logging
logging.level.root=WARN
logging.level.com.dtapp=INFO
