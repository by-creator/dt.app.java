# Heroku Profile Configuration

# Database Configuration for Heroku
# If DATABASE_URL is set (from add-on), use it; otherwise use explicit vars
# Example: mysql://user:pass@host:port/db?reconnect=true
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:dummy}:${MYSQL_PORT:3306}/${MYSQL_DB:dummy}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&connectTimeout=2000
spring.datasource.username=${MYSQL_USER:dummy}
spring.datasource.password=${MYSQL_PASSWORD:dummy}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.initialization-fail-timeout=0

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
# IMPORTANT: Set FLYWAY_ENABLED=true and configure MYSQL_* vars before first deploy
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=false
spring.flyway.baseline-on-migrate=true
spring.flyway.sql-migration-prefix=V
spring.flyway.sql-migration-separator=__

# Data Initializer
# IMPORTANT: Set DATA_INIT_ENABLED=true after database is configured
app.data-initializer.enabled=${DATA_INIT_ENABLED:false}

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-message=always
server.error.include-stacktrace=on_param

# DevTools disabled on Heroku
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Servlet Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Mail Configuration (optional - configure via environment vars if needed)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreplysitedt@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQ:true}

# Application Configuration
app.base-url=${APP_BASE_URL:https://site-dt-production-98050a853413.herokuapp.com}
app.upload.dir=${UPLOAD_DIR:uploads/codifications}

# Logging Configuration
logging.level.root=INFO
logging.level.com.dtapp=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
